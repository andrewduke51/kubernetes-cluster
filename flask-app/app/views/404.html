<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
</head>
<body>
<main class="not-found">
    <div id="container" aria-hidden="true">
        <div class="deloreanblue">
            <div class="deloreanred"></div>
        </div>
    </div>

    <section class="text-container" aria-labelledby="not-found-title">
        <h1 id="not-found-title">404</h1>
        <p>Something went wrong.<br>The page was deleted or does not exist.</p>
        <div class="actions">
            <a class="back" href="{{ url_for('index') }}">Back home</a>
            <a class="back" href="https://www.youtube.com/results?search_query=funny+back+to+the+future+404" rel="noopener">Search YouTube</a>
        </div>
    </section>
</main>

<script>
    const container = document.getElementById("container");
    const delorean = document.querySelector(".deloreanblue");
    let demoCount = 0;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    function moveDelorean(x, y) {
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const rotateY = ((x - centerX) * -0.3) * 0.03;
        const rotateX = ((y - centerY) * 0.3) * 0.03;

        delorean.style.transform = `perspective(1000px) rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
    }

    document.body.addEventListener("mousemove", (event) => {
        mouseX = event.pageX;
        mouseY = event.pageY;
        moveDelorean(mouseX, mouseY);
    });

    const intro = window.setInterval(() => {
        if (demoCount >= 60) {
            window.clearInterval(intro);
            return;
        }

        mouseX += 2;
        demoCount += 1;
        moveDelorean(mouseX, mouseY);
    }, 20);

    moveDelorean(mouseX, mouseY);
</script>
</body>
</html>
