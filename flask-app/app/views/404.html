<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Timeline Missed</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
</head>
<body>
<main class="not-found">
    <section class="scene" aria-label="Page not found">
        <div class="stars" aria-hidden="true"></div>

        <div class="road" aria-hidden="true">
            <div class="road-line"></div>
            <div class="sparks sparks-left"></div>
            <div class="sparks sparks-right"></div>

            <svg class="time-car" viewBox="0 0 520 220" role="img" aria-labelledby="car-title car-desc">
                <title id="car-title">Time machine car</title>
                <desc id="car-desc">A small car leaving bright tracks on a dark road.</desc>
                <path class="car-shadow" d="M72 183h365c25 0 45 6 45 14s-20 14-45 14H72c-25 0-45-6-45-14s20-14 45-14Z"/>
                <path class="car-body" d="M52 132l62-54 78-16h119l86 28 66 58-24 31H87l-35-47Z"/>
                <path class="car-roof" d="M171 72h118l72 45H125l46-45Z"/>
                <path class="window" d="M182 82h80l28 34H151l31-34Z"/>
                <path class="window rear" d="M280 82h12l52 34h-42l-22-34Z"/>
                <path class="bumper" d="M62 148h47l20 31H87l-25-31Z"/>
                <path class="bumper" d="M399 148h55l-24 31h-51l20-31Z"/>
                <circle class="wheel" cx="148" cy="174" r="33"/>
                <circle class="wheel" cx="364" cy="174" r="33"/>
                <circle class="hub" cx="148" cy="174" r="14"/>
                <circle class="hub" cx="364" cy="174" r="14"/>
                <path class="flux" d="M252 97l-18 50h34l-24 42 64-63h-36l24-29h-44Z"/>
                <path class="headlight" d="M453 143l38 8-39 13-17-15 18-6Z"/>
                <path class="tail-light" d="M54 134l-28-4 30 21 17-6-19-11Z"/>
            </svg>
        </div>

        <section class="panel">
            <p class="eyebrow">Timeline error</p>
            <h1>404</h1>
            <p class="message">This page vanished at 88 mph.</p>
            <div class="actions">
                <a class="button primary" href="{{ url_for('index') }}">Back home</a>
                <a class="button secondary" href="https://www.youtube.com/watch?v=G3AfIvJBcGo">Risk it</a>
            </div>
        </section>
    </section>
</main>
</body>
</html>
