<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
</head>
<body>
<main class="not-found">
    <section class="error-panel" aria-labelledby="not-found-title">
        <img
            class="monkey"
            src="{{ url_for('static', filename='images/nft_monkey.png') }}"
            alt="Confused monkey"
        >
        <div class="copy">
            <h1 id="not-found-title">404</h1>
            <p class="message">This page is not available. Sorry about that.</p>
            <p class="hint">Try heading home, or search YouTube for something better.</p>
            <div class="actions">
                <a class="button primary" href="{{ url_for('index') }}">Back home</a>
                <a class="button secondary" href="https://www.youtube.com/results?search_query=funny+monkey+404" rel="noopener">Search YouTube</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
